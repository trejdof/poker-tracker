<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Poker Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      min-height: 100vh;
    }

    nav {
      background: #1a1d27;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 24px;
      border-bottom: 1px solid #2a2d3a;
    }

    nav h1 {
      font-size: 1.2rem;
      color: #c9a84c;
      font-weight: 700;
      margin-right: auto;
    }

    nav button {
      background: none;
      border: none;
      color: #aaa;
      cursor: pointer;
      font-size: 0.95rem;
      padding: 6px 12px;
      border-radius: 6px;
      transition: all 0.2s;
    }

    nav button:hover, nav button.active {
      background: #2a2d3a;
      color: #fff;
    }

    .page { display: none; padding: 24px; max-width: 800px; margin: 0 auto; }
    .page.active { display: block; }

    h2 { font-size: 1.3rem; margin-bottom: 20px; color: #c9a84c; }

    /* Card */
    .card {
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .card .info { flex: 1; }
    .card .name { font-weight: 600; font-size: 1rem; }
    .card .sub { font-size: 0.82rem; color: #888; margin-top: 2px; }
    .card .balance { font-weight: 700; font-size: 1rem; }
    .balance.pos { color: #4caf82; }
    .balance.neg { color: #e05c5c; }
    .balance.zero { color: #888; }

    .card .actions { display: flex; gap: 8px; }

    /* Buttons */
    .btn {
      border: none;
      border-radius: 6px;
      padding: 8px 16px;
      cursor: pointer;
      font-size: 0.88rem;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #c9a84c; color: #0f1117; }
    .btn-danger { background: #e05c5c; color: #fff; }
    .btn-ghost { background: #2a2d3a; color: #ccc; }

    /* Form */
    .form-group { margin-bottom: 14px; }
    label { display: block; font-size: 0.85rem; color: #aaa; margin-bottom: 6px; }
    input {
      width: 100%;
      background: #12141e;
      border: 1px solid #2a2d3a;
      border-radius: 6px;
      padding: 10px 12px;
      color: #e0e0e0;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #c9a84c; }

    .form-row { display: flex; gap: 10px; }
    .form-row .form-group { flex: 1; }

    .form-actions { display: flex; gap: 10px; margin-top: 6px; }

    /* Add form panel */
    .panel {
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .panel h3 { font-size: 1rem; margin-bottom: 16px; color: #ccc; }

    .empty { color: #555; text-align: center; padding: 40px 0; }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 12px;
      padding: 24px;
      width: 100%;
      max-width: 420px;
      margin: 16px;
    }
    .modal h3 { margin-bottom: 16px; color: #c9a84c; }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #2a2d3a;
      color: #fff;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 0.9rem;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 200;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<nav>
  <h1>♠ Poker Tracker</h1>
  <button class="active" onclick="showPage('players')">Players</button>
  <button onclick="showPage('sessions')">Games</button>
</nav>

<!-- PLAYERS PAGE -->
<div id="page-players" class="page active">
  <h2>Players</h2>

  <div class="panel">
    <h3>Add Player</h3>
    <div class="form-row">
      <div class="form-group">
        <label>Name</label>
        <input id="add-name" type="text" placeholder="e.g. Marko" />
      </div>
      <div class="form-group">
        <label>Bank Account</label>
        <input id="add-bank" type="text" placeholder="18-digit account number" />
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" onclick="addPlayer()">Add Player</button>
    </div>
  </div>

  <div id="players-list"></div>
</div>

<!-- SESSIONS PAGE -->
<div id="page-sessions" class="page">
  <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;">
    <h2 style="margin-bottom:0;">Games</h2>
    <button class="btn btn-primary" onclick="openNewSession()">+ New Game</button>
  </div>
  <!-- Filter tabs -->
  <div style="display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap;">
    <button id="filter-all" class="btn btn-ghost" style="font-size:0.82rem; padding:6px 14px;" onclick="setFilter('all')">All</button>
    <button id="filter-live" class="btn btn-ghost" style="font-size:0.82rem; padding:6px 14px;" onclick="setFilter('live')">Live</button>
    <button id="filter-unsettled" class="btn btn-ghost" style="font-size:0.82rem; padding:6px 14px;" onclick="setFilter('unsettled')">Unsettled</button>
    <button id="filter-closed" class="btn btn-ghost" style="font-size:0.82rem; padding:6px 14px;" onclick="setFilter('closed')">Closed</button>
  </div>
  <div id="sessions-list"></div>
  <!-- Deleted games -->
  <div style="margin-top:24px;">
    <div onclick="toggleDeletedGames()" style="cursor:pointer; display:flex; align-items:center; gap:8px; color:#555; font-size:0.88rem; margin-bottom:12px;">
      <span id="deleted-toggle-icon">▶</span>
      <span>Deleted Games</span>
    </div>
    <div id="deleted-games-list" style="display:none;"></div>
  </div>
</div>

<!-- HISTORY SETTLEMENT PAGE -->
<div id="page-history-settlement" class="page">
  <div style="display:flex; align-items:center; gap:12px; margin-bottom:20px;">
    <button class="btn btn-ghost" onclick="showPage('sessions')">← Back</button>
    <h2 style="margin-bottom:0; flex:1;" id="history-settlement-title"></h2>
  </div>
  <div id="history-settlement-content"></div>
</div>

<!-- SETTLEMENT PAGE -->
<div id="page-settlement" class="page">
  <div style="display:flex; align-items:center; gap:12px; margin-bottom:20px;">
    <button class="btn btn-ghost" onclick="backToSessions()">← Back to Games</button>
    <h2 style="margin-bottom:0;">Settlement</h2>
  </div>
  <div id="settlement-content"></div>
</div>

<!-- SESSION SCREEN -->
<div id="page-session" class="page">
  <!-- Top bar -->
  <div style="margin-bottom:20px;">
    <div style="display:flex; align-items:center; gap:10px; margin-bottom:8px;">
      <h2 style="margin-bottom:0; flex:1;" id="session-title"></h2>
      <span id="session-status-badge"></span>
    </div>
    <div style="display:flex; align-items:center; gap:10px;">
      <button class="btn btn-ghost" onclick="backToSessions()">← Back</button>
      <div style="flex:1;"></div>
      <button class="btn btn-danger" id="btn-close-session" onclick="closeSession()" style="display:none;">End Game</button>
    </div>
  </div>

  <!-- Stats bar -->
  <div style="display:flex; gap:12px; margin-bottom:20px;">
    <div class="panel" style="flex:1; margin-bottom:0; text-align:center;">
      <div style="font-size:0.8rem; color:#888; margin-bottom:4px;">Total Chips</div>
      <div id="session-total-chips" style="font-size:1.4rem; font-weight:700; color:#c9a84c;">0</div>
    </div>
    <div class="panel" id="timer-panel" style="flex:1; margin-bottom:0; text-align:center; cursor:pointer;" onclick="handleTimerClick()">
      <div style="font-size:0.8rem; color:#888; margin-bottom:4px;">Duration</div>
      <div id="session-timer" style="font-size:1.4rem; font-weight:700; color:#c9a84c;">--:--</div>
      <div id="timer-hint" style="font-size:0.75rem; color:#555; margin-top:2px;"></div>
    </div>
  </div>

  <!-- Players in session -->
  <!-- Add player button (only when open/waiting) -->
  <div id="session-actions" style="margin-bottom:16px; display:none;">
    <button class="btn btn-primary" style="width:100%;" onclick="openAddPlayerToSession()">+ Add Player</button>
  </div>

  <div id="session-players-list"></div>
</div>

<!-- QR Modal -->
<div class="modal-overlay" id="qr-modal">
  <div class="modal" style="text-align:center;">
    <h3 id="qr-title">Pay to Player</h3>
    <div class="form-group">
      <label>Amount (RSD)</label>
      <input id="qr-amount" type="number" min="1" step="100" placeholder="e.g. 500" />
    </div>
    <div class="form-actions" style="justify-content:center;">
      <button class="btn btn-primary" onclick="generateQR()">Generate QR</button>
      <button class="btn btn-ghost" onclick="closeQRModal()">Cancel</button>
    </div>
    <div id="qr-image-wrap" style="margin-top:16px; display:none;">
      <img id="qr-image" src="" style="width:220px;height:220px;border-radius:8px;" />
    </div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <h3>Edit Player</h3>
    <input type="hidden" id="edit-id" />
    <div class="form-group">
      <label>Name</label>
      <input id="edit-name" type="text" />
    </div>
    <div class="form-group">
      <label>Bank Account</label>
      <input id="edit-bank" type="text" />
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" onclick="saveEdit()">Save</button>
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<!-- End Game Modal -->
<div class="modal-overlay" id="end-game-modal">
  <div class="modal" style="max-width:500px; max-height:90vh; overflow-y:auto;">
    <h3>End Game — Final Chips</h3>
    <div style="font-size:0.85rem; color:#888; margin-bottom:16px;">
      Total buy-ins: <strong style="color:#c9a84c;" id="end-game-total-buyins"></strong> RSD
    </div>
    <div id="final-stacks-form"></div>
    <div id="chip-mismatch" style="display:none; background:#2a1f1f; border:1px solid #e05c5c; border-radius:8px; padding:10px 14px; font-size:0.85rem; color:#e05c5c; margin-bottom:14px;"></div>
    <div class="form-actions" style="margin-top:8px;">
      <button class="btn btn-primary" onclick="submitEndGame()">Calculate Settlement</button>
      <button class="btn btn-ghost" onclick="document.getElementById('end-game-modal').classList.remove('open')">Cancel</button>
    </div>
  </div>
</div>

<!-- Add Player to Session Modal -->
<div class="modal-overlay" id="add-player-session-modal">
  <div class="modal">
    <h3>Add Player</h3>
    <div class="form-group">
      <label>Player</label>
      <select id="session-player-select" style="width:100%;background:#12141e;border:1px solid #2a2d3a;border-radius:6px;padding:10px 12px;color:#e0e0e0;font-size:0.95rem;outline:none;">
        <option value="">Select player...</option>
      </select>
    </div>
    <div class="form-group">
      <label>Initial Buy-in (RSD)</label>
      <input id="session-buyin-amount" type="number" min="100" step="100" placeholder="e.g. 1000" />
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" onclick="addPlayerToSession()">Add</button>
      <button class="btn btn-ghost" onclick="closeAddPlayerToSession()">Cancel</button>
    </div>
  </div>
</div>

<!-- Re-buy Modal -->
<div class="modal-overlay" id="rebuy-modal">
  <div class="modal">
    <h3 id="rebuy-title">Re-buy</h3>
    <div class="form-group">
      <label>Amount (RSD)</label>
      <input id="rebuy-amount" type="number" min="100" step="100" placeholder="e.g. 1000" />
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" onclick="submitRebuy()">Confirm</button>
      <button class="btn btn-ghost" onclick="closeRebuyModal()">Cancel</button>
    </div>
  </div>
</div>

<!-- Cash Out Modal -->
<div class="modal-overlay" id="cashout-modal">
  <div class="modal">
    <h3 id="cashout-title">Cash Out</h3>
    <div style="font-size:0.85rem; color:#888; margin-bottom:14px;">Player removes chips from the table. This reduces their effective buy-in.</div>
    <div class="form-group">
      <label>Amount (RSD)</label>
      <input id="cashout-amount" type="number" min="100" step="100" placeholder="e.g. 500" />
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" onclick="submitCashOut()">Confirm</button>
      <button class="btn btn-ghost" onclick="closeCashOutModal()">Cancel</button>
    </div>
  </div>
</div>

<!-- New Session Modal -->
<div class="modal-overlay" id="new-session-modal">
  <div class="modal">
    <h3>New Session</h3>
    <div class="form-group">
      <label>Game Type</label>
      <div style="display:flex; gap:10px; margin-top:4px;">
        <button class="btn btn-ghost" id="type-cash" onclick="selectType('cash')" style="flex:1;">Cash Game</button>
        <button class="btn btn-ghost" id="type-tournament" onclick="selectType('tournament')" style="flex:1;">Tournament</button>
      </div>
    </div>
    <div class="form-group">
      <label>Default Buy-in (RSD)</label>
      <input id="new-session-buyin" type="number" min="0" step="100" placeholder="e.g. 1000" />
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" onclick="createSession()">Start Session</button>
      <button class="btn btn-ghost" onclick="closeNewSession()">Cancel</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  function balanceClass(val) {
    if (val > 0) return 'pos';
    if (val < 0) return 'neg';
    return 'zero';
  }

  function balanceLabel(val) {
    if (val > 0) return '+' + val;
    return val;
  }

  async function loadPlayers() {
    const res = await fetch('/api/players');
    const players = await res.json();
    const list = document.getElementById('players-list');

    if (players.length === 0) {
      list.innerHTML = '<p class="empty">No players yet. Add one above.</p>';
      return;
    }

    list.innerHTML = players.map(p => `
      <div class="card">
        <div class="info">
          <div class="name">${p.name}</div>
          ${p.pending_debt > 0 ? `<div class="sub" style="color:#e05c5c;">owes ${p.pending_debt.toLocaleString()} RSD</div>` : ''}
          ${p.pending_receivable > 0 ? `<div class="sub" style="color:#4caf82;">expects ${p.pending_receivable.toLocaleString()} RSD</div>` : ''}
        </div>
        <div class="balance ${balanceClass(p.total_balance)}">${balanceLabel(p.total_balance)} RSD</div>
        <div class="actions">
          <button class="btn btn-ghost" onclick="openQR(${p.id}, '${p.name}')">QR</button>
          <button class="btn btn-ghost" onclick="openEdit(${p.id}, '${p.name}', '${p.bank_account}')">Edit</button>
          <button class="btn btn-danger" onclick="deletePlayer(${p.id}, '${p.name}')">Delete</button>
        </div>
      </div>
    `).join('');
  }

  async function addPlayer() {
    const name = document.getElementById('add-name').value.trim();
    const bank = document.getElementById('add-bank').value.trim();
    if (!name || !bank) { showToast('Fill in all fields'); return; }

    const res = await fetch('/api/players', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, bank_account: bank })
    });

    if (res.ok) {
      document.getElementById('add-name').value = '';
      document.getElementById('add-bank').value = '';
      showToast('Player added');
      loadPlayers();
    } else {
      const err = await res.json();
      showToast(err.error);
    }
  }

  function openEdit(id, name, bank) {
    document.getElementById('edit-id').value = id;
    document.getElementById('edit-name').value = name;
    document.getElementById('edit-bank').value = bank;
    document.getElementById('edit-modal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('edit-modal').classList.remove('open');
  }

  async function saveEdit() {
    const id = document.getElementById('edit-id').value;
    const name = document.getElementById('edit-name').value.trim();
    const bank = document.getElementById('edit-bank').value.trim();

    const res = await fetch(`/api/players/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, bank_account: bank })
    });

    if (res.ok) {
      closeModal();
      showToast('Player updated');
      loadPlayers();
    } else {
      const err = await res.json();
      showToast(err.error);
    }
  }

  async function deletePlayer(id, name) {
    if (!confirm(`Delete ${name}?`)) return;
    const res = await fetch(`/api/players/${id}`, { method: 'DELETE' });
    if (res.ok) { showToast('Player deleted'); loadPlayers(); }
  }

  let qrPlayerId = null;

  function openQR(id, name) {
    qrPlayerId = id;
    document.getElementById('qr-title').textContent = `Pay to ${name}`;
    document.getElementById('qr-amount').value = '';
    document.getElementById('qr-image-wrap').style.display = 'none';
    document.getElementById('qr-modal').classList.add('open');
  }

  function closeQRModal() {
    document.getElementById('qr-modal').classList.remove('open');
  }

  function generateQR() {
    const amount = document.getElementById('qr-amount').value.trim();
    if (!amount || amount <= 0) { showToast('Enter a valid amount'); return; }
    const img = document.getElementById('qr-image');
    img.src = `/api/players/${qrPlayerId}/qr/${amount}`;
    document.getElementById('qr-image-wrap').style.display = 'block';
  }

  // --- Session Screen ---
  let currentSession = null;
  let timerInterval = null;
  let rebuySessionPlayerId = null;

  function backToSessions() {
    clearInterval(timerInterval);
    currentSession = null;
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-sessions').classList.add('active');
    loadSessions();
  }

  async function openSession(id) {
    clearInterval(timerInterval);
    timerInterval = null;
    const res = await fetch(`/api/sessions/${id}`);
    const session = await res.json();
    currentSession = session;
    renderSessionScreen(session);
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById('page-session').classList.add('active');
  }

  function renderSessionScreen(session) {
    const typeLabel = session.type === 'cash' ? 'Cash Game' : 'Tournament';
    document.getElementById('session-title').textContent = `${typeLabel} #${session.id}`;

    const isWaiting = session.status === 'waiting';
    const isOpen = session.status === 'open';
    const isClosed = session.status === 'closed';

    document.getElementById('session-status-badge').innerHTML = isOpen
      ? '<span style="color:#4caf82;font-size:0.85rem;font-weight:600;">● LIVE</span>'
      : isWaiting
        ? '<span style="color:#c9a84c;font-size:0.85rem;font-weight:600;">● WAITING</span>'
        : '<span style="color:#888;font-size:0.85rem;">CLOSED</span>';

    document.getElementById('btn-close-session').style.display = isOpen ? 'inline-block' : 'none';
    document.getElementById('session-total-chips').textContent = session.total_chips.toLocaleString() + ' RSD';

    document.getElementById('session-actions').style.display = (isOpen || isWaiting) ? 'block' : 'none';

    // Timer panel
    clearInterval(timerInterval);
    timerInterval = null;
    document.getElementById('timer-panel').style.cursor = isWaiting ? 'pointer' : 'default';

    const timerEl = document.getElementById('session-timer');
    const hintEl = document.getElementById('timer-hint');
    if (isOpen && session.started_at) {
      timerEl.style.color = '#4caf82';
      hintEl.textContent = '';
      startTimer(session.started_at);
    } else if (isWaiting || !session.started_at) {
      timerEl.textContent = '--:--';
      timerEl.style.color = '#4caf82';
      hintEl.innerHTML = '<span style="color:#4caf82; font-size:0.8rem; font-weight:600;">▶ Tap to start</span>';
    } else if (isClosed && session.started_at) {
      timerEl.style.color = '#888';
      hintEl.textContent = '';
      timerEl.textContent = formatDuration(session.started_at, session.ended_at);
    }

    const list = document.getElementById('session-players-list');
    if (session.players.length === 0) {
      list.innerHTML = isWaiting
        ? '<p class="empty">Game not started yet. Tap the timer to start, or add players first.</p>'
        : '<p class="empty">No players in this game.</p>';
      return;
    }

    list.innerHTML = session.players.map(p => `
      <div style="
        background: linear-gradient(135deg, #1e2130 0%, #161926 100%);
        border: 1px solid #2e3347;
        border-left: 4px solid #c9a84c;
        border-radius: 12px;
        padding: 16px 18px;
        margin-bottom: 10px;
      ">
        <!-- Top row: name + total -->
        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;">
          <div style="font-size:1.15rem; font-weight:700; color:#fff; letter-spacing:0.3px;">${p.player_name}</div>
          <div style="display:flex; align-items:baseline; gap:4px;">
            <span style="font-size:1.4rem; font-weight:800; color:#c9a84c;">${p.total_buyin.toLocaleString()}</span>
            <span style="font-size:0.78rem; color:#666; font-weight:500;">RSD</span>
          </div>
        </div>
        <!-- Buy-in pills -->
        <div style="display:flex; flex-wrap:wrap; gap:6px; margin-bottom:${isOpen || isWaiting ? '12px' : '0'};">
          ${p.buyins.map((b, i) => b.amount < 0 ? `
            <span style="background:#0f1117; border:1px solid #2a2d3a; border-radius:6px; padding:4px 10px; font-size:0.78rem; color:#888;">
              Cash Out &nbsp;<strong style="color:#e05c5c;">${b.amount.toLocaleString()}</strong>
            </span>
          ` : `

  function formatDuration(startedAt, endedAt = null) {
    if (!startedAt) return '--:--';
    if (!startedAt.endsWith('Z')) startedAt += 'Z';
    const end = endedAt ? new Date((endedAt.endsWith('Z') ? endedAt : endedAt + 'Z')).getTime() : Date.now();
    const elapsed = Math.floor((end - new Date(startedAt).getTime()) / 1000);
    const h = Math.floor(elapsed / 3600);
    const m = Math.floor((elapsed % 3600) / 60);
    const s = elapsed % 60;
    const pad = n => String(n).padStart(2, '0');
    return h > 0 ? `${pad(h)}:${pad(m)}:${pad(s)}` : `${pad(m)}:${pad(s)}`;
  }

  function startTimer(startedAt) {
    clearInterval(timerInterval);
    if (!startedAt.endsWith('Z')) startedAt += 'Z';
    const start = new Date(startedAt).getTime();
    function tick() {
      const elapsed = Math.floor((Date.now() - start) / 1000);
      const h = Math.floor(elapsed / 3600);
      const m = Math.floor((elapsed % 3600) / 60);
      const s = elapsed % 60;
      const pad = n => String(n).padStart(2, '0');
      document.getElementById('session-timer').textContent =
        h > 0 ? `${pad(h)}:${pad(m)}:${pad(s)}` : `${pad(m)}:${pad(s)}`;
    }
    tick();
    timerInterval = setInterval(tick, 1000);
  }

  function closeSession() {

    const totalBuyins = players.reduce((s, p) => s + p.total_buyin, 0);
    document.getElementById('end-game-total-buyins').textContent = totalBuyins.toLocaleString();

    const form = document.getElementById('final-stacks-form');
    form.innerHTML = players.map(p => `
      <div style="display:flex; align-items:center; gap:12px; margin-bottom:12px;">
        <div style="flex:1; font-weight:600;">${p.player_name}</div>

          placeholder="Final chips"
          style="width:140px; background:#12141e; border:1px solid #2a2d3a; border-radius:6px; padding:8px 10px; color:#e0e0e0; font-size:0.95rem; outline:none;"
          oninput="updateChipMismatch()"

  function updateChipMismatch() {
    const players = currentSession.players;
    const totalBuyins = players.reduce((s, p) => s + p.total_buyin, 0);
    const finalValues = players.map(p => ({
      ...p,
      final: parseInt(document.getElementById(`final-${p.id}`)?.value) || 0
    }));
    const totalFinal = finalValues.reduce((s, p) => s + p.final, 0);
    const mismatch = document.getElementById('chip-mismatch');

    if (totalFinal === 0 || totalFinal === totalBuyins) {
      mismatch.style.display = 'none';
      return;
    }

    const diff = totalFinal - totalBuyins;

    if (diff > 0) {
      // More chips than expected — harmless
      mismatch.style.display = 'block';
      mismatch.style.borderColor = '#c9a84c';
      mismatch.style.color = '#c9a84c';
      mismatch.style.background = '#1e1a0f';
      mismatch.innerHTML = `⚠ ${diff.toLocaleString()} RSD extra chips counted — no adjustment needed, proceed as-is.`;
      return;
    }

    // Missing chips — show who absorbs the loss
    const missing = -diff;
    const winners = finalValues.filter(p => p.final - p.total_buyin > 0);
    const totalWinnings = winners.reduce((s, p) => s + (p.final - p.total_buyin), 0);

    let absorptionHtml = '';
    if (winners.length === 0) {
      absorptionHtml = '<div style="margin-top:6px; color:#aaa; font-size:0.82rem;">No winners to absorb the difference.</div>';
    } else {
      absorptionHtml = '<div style="margin-top:8px; font-size:0.82rem; color:#aaa;">Winners absorb the missing chips:</div>' +
        winners.map(p => {
          const share = Math.round(missing * (p.final - p.total_buyin) / totalWinnings);
          return `<div style="display:flex; justify-content:space-between; margin-top:4px;">
            <span>${p.player_name}</span>
            <span style="color:#e05c5c; font-weight:600;">-${share.toLocaleString()} RSD</span>
          </div>`;
        }).join('');
    }

    mismatch.style.display = 'block';
    mismatch.style.borderColor = '#e05c5c';
    mismatch.style.color = '#e05c5c';
    mismatch.style.background = '#2a1f1f';
    mismatch.innerHTML = `⚠ ${missing.toLocaleString()} RSD missing from the pot.${absorptionHtml}`;
  }

  async function submitEndGame() {
    const players = currentSession.players;
    const totalBuyins = players.reduce((s, p) => s + p.total_buyin, 0);

    const finalStacks = players.map(p => ({
      session_player_id: p.id,
      final_chips: parseInt(document.getElementById(`final-${p.id}`)?.value) || 0
    }));

    const totalFinal = finalStacks.reduce((s, e) => s + e.final_chips, 0);
    const mismatch = totalFinal !== totalBuyins;

    if (mismatch && totalFinal - totalBuyins < 0) {
      // Apply proportional absorption to winners' final chips
      const missing = totalBuyins - totalFinal;
      const winners = finalStacks.filter(f => {
        const p = players.find(p => p.id === f.session_player_id);
        return f.final_chips - p.total_buyin > 0;
      });
      const totalWinnings = winners.reduce((s, f) => {
        const p = players.find(p => p.id === f.session_player_id);
        return s + (f.final_chips - p.total_buyin);
      }, 0);

      let remainder = missing;
      winners.forEach((f, i) => {
        const p = players.find(p => p.id === f.session_player_id);
        const share = i === winners.length - 1
          ? remainder
          : Math.round(missing * (f.final_chips - p.total_buyin) / totalWinnings);
        f.final_chips -= share;
        remainder -= share;
      });
    }

    const res = await fetch(`/api/sessions/${currentSession.id}/finalize`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ final_stacks: finalStacks })
    });

    if (res.ok) {
      const result = await res.json();
      document.getElementById('end-game-modal').classList.remove('open');
      showSettlement(result);
    } else {
      const err = await res.json();
      showToast(err.error);
    }
  }

    const res = await fetch('/api/sessions', {

  let activeFilter = 'all';
  let allSessions = [];

  function setFilter(filter) {
    activeFilter = filter;
    ['all','live','unsettled','closed'].forEach(f => {
      const btn = document.getElementById(`filter-${f}`);
      btn.classList.toggle('btn-primary', f === filter);
      btn.classList.toggle('btn-ghost', f !== filter);
    });
    renderSessionsList();

  async function loadSessions() {
    const res = await fetch('/api/sessions');
    allSessions = await res.json();
    setFilter(activeFilter);
  }

  function renderSessionsList() {
    const list = document.getElementById('sessions-list');

    let filtered = allSessions;
    if (activeFilter === 'live') filtered = allSessions.filter(s => s.status === 'open' || s.status === 'waiting');
    if (activeFilter === 'unsettled') filtered = allSessions.filter(s => s.status === 'closed' && s.unconfirmed_count > 0);
    if (activeFilter === 'closed') filtered = allSessions.filter(s => s.status === 'closed');

    if (filtered.length === 0) {
      list.innerHTML = '<p class="empty">No games found.</p>';
      return;
    }

    list.innerHTML = filtered.map(s => {
      const typeLabel = s.type === 'cash' ? 'Cash Game' : 'Tournament';
      const startedRaw = s.started_at ? (s.started_at.endsWith('Z') ? s.started_at : s.started_at + 'Z') : null;
      const dateStr = startedRaw
        ? new Date(startedRaw).toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' })
        : 'Not started';

      let badge = '';
      if (s.status === 'open') badge = '<span style="color:#4caf82;font-size:0.8rem;font-weight:600;">● LIVE</span>';
      else if (s.status === 'waiting') badge = '<span style="color:#c9a84c;font-size:0.8rem;font-weight:600;">● WAITING</span>';
      else if (s.unconfirmed_count > 0) badge = `<span style="color:#e05c5c;font-size:0.8rem;font-weight:600;">⚠ ${s.unconfirmed_count} unsettled</span>`;
      else badge = '<span style="color:#4caf82;font-size:0.8rem;">✓ Settled</span>';

      const onclick = s.status === 'closed'
        ? `openHistorySettlement(${s.id}, '${typeLabel} #${s.id}')`
        : `openSession(${s.id})`;

      return `
        <div class="card" style="cursor:pointer;" onclick="${onclick}">
          <div class="info">
            <div class="name">${typeLabel} #${s.id}</div>
            <div class="sub">${dateStr}</div>
          </div>
          <div style="display:flex; align-items:center; gap:10px;">
            ${badge}
            ${s.status === 'closed' ? `<button class="btn btn-danger" style="padding:5px 10px; font-size:0.78rem;" onclick="event.stopPropagation(); deleteGame(${s.id})">Delete</button>` : ''}
          </div>
        </div>
      `;
    }).join('');
  }

  function showPage(name) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById('page-' + name).classList.add('active');
    if (event && event.target) event.target.classList.add('active');
    if (name === 'sessions') loadSessions();
    if (name === 'players') loadPlayers();
  }

  loadPlayers();
</script>
</body>
</html>
