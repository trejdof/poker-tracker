<div id="page-no-chips-game" class="page nc-page">

  <!-- JOIN SCREEN -->
  <div id="nc-join-screen" class="nc-join-screen" style="display:none;">
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:20px;">
      <h2 style="margin:0;">Join Game</h2>
      <button class="btn btn-ghost" style="font-size:0.82rem;" onclick="backToSessions()">← Back</button>
    </div>
    <p style="color:#888; font-size:0.88rem; margin-bottom:16px;">Select your seat to play</p>
    <div id="nc-join-list"></div>
    <div id="nc-add-player-section" style="margin-top:20px;">
      <div style="font-size:0.78rem; color:#555; text-transform:uppercase; letter-spacing:0.08em; margin-bottom:10px;">Add players to game</div>
      <div style="display:flex; gap:8px;">
        <select id="nc-add-player-select" style="flex:1; background:#12141e; border:1px solid #2a2d3a; border-radius:6px; padding:10px 12px; color:#e0e0e0; font-size:0.9rem; outline:none;">
          <option value="">Select player…</option>
        </select>
        <button class="btn btn-primary" style="padding:10px 16px;" onclick="ncAddPlayer()">Add</button>
      </div>
    </div>
  </div>

  <!-- GAME SCREEN -->
  <div id="nc-game-screen" style="display:none;">

    <!-- Top bar -->
    <div class="nc-topbar">
      <button class="btn btn-ghost nc-back-btn" onclick="backToSessions()">←</button>
      <span id="nc-playing-as" class="nc-playing-as-label" onclick="ncSwitchSeat()" title="Tap to switch seat"></span>
      <div id="nc-hand-number" class="nc-hand-number"></div>
    </div>

    <!-- Pot -->
    <div class="nc-pot-area">
      <div class="nc-pot-label">POT</div>
      <div id="nc-pot-value" class="nc-pot-value">0</div>
    </div>

    <!-- Role banner -->
    <div id="nc-role-badge" class="nc-role-badge"></div>

    <!-- Stack + bets -->
    <div class="nc-stack-area">
      <div id="nc-stack-value" class="nc-stack-value">0</div>
      <div id="nc-bets-row" class="nc-bets-row"></div>
    </div>

    <!-- Active hand: numpad -->
    <div id="nc-numpad" class="nc-numpad" style="display:none;">
      <div class="nc-preset-grid">
        <button class="nc-preset-btn" onclick="ncSelectPreset(10)">10</button>
        <button class="nc-preset-btn" onclick="ncSelectPreset(20)">20</button>
        <button class="nc-preset-btn" onclick="ncSelectPreset(30)">30</button>
        <button class="nc-preset-btn" onclick="ncSelectPreset(40)">40</button>
        <button class="nc-preset-btn" onclick="ncSelectPreset(50)">50</button>
        <button class="nc-preset-btn" onclick="ncSelectPreset(60)">60</button>
        <button class="nc-preset-btn" onclick="ncSelectPreset(90)">90</button>
        <button class="nc-preset-btn" onclick="ncSelectPreset(100)">100</button>
        <button class="nc-preset-btn" onclick="ncSelectPreset(120)">120</button>
      </div>
      <div class="nc-custom-row">
        <button class="nc-custom-step" onclick="ncCustomStep(-10)">−</button>
        <input type="number" id="nc-custom-val" class="nc-custom-display" value="10" min="10" step="10" inputmode="numeric" oninput="ncOnCustomInput()">
        <button class="nc-custom-step" onclick="ncCustomStep(10)">+</button>
      </div>
      <button class="btn btn-primary nc-place-bet-btn" onclick="ncPlaceBet()">PLACE BET — <span id="nc-bet-preview">10</span></button>
      <button class="btn btn-ghost nc-revert-btn" onclick="ncRevertBet()">↩ Revert last bet</button>
      <button id="nc-end-hand-btn" class="btn btn-danger nc-end-hand-btn" onclick="ncConfirmEndHand()" style="display:none;">END HAND</button>
    </div>

    <!-- Between hands: waiting -->
    <div id="nc-waiting-area" class="nc-waiting-area" style="display:none;">
      <div id="nc-positions-list" class="nc-positions-list"></div>
      <div id="nc-waiting-text" class="nc-waiting-text">WAITING</div>
      <button id="nc-start-hand-btn" class="btn btn-primary nc-start-hand-btn" onclick="ncStartHand()" style="display:none;">START HAND</button>
    </div>

  </div>

  <!-- WINNER PICKER MODAL -->
  <div class="modal-overlay" id="nc-winner-modal">
    <div class="modal">
      <h3>Select Winner(s)</h3>
      <p id="nc-winner-pot-label" style="color:#888; font-size:0.88rem; margin-bottom:16px;"></p>
      <div id="nc-winner-list" style="margin-bottom:16px;"></div>
      <div id="nc-split-preview" style="color:#c9a84c; font-size:0.9rem; margin-bottom:16px; min-height:20px;"></div>
      <div class="form-actions">
        <button class="btn btn-primary" onclick="ncSubmitEndHand()">Confirm</button>
        <button class="btn btn-ghost" onclick="ncCloseWinnerModal()">Cancel</button>
      </div>
    </div>
  </div>

</div>
