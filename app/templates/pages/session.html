<!-- SESSION SCREEN -->
<div id="page-session" class="page">
<div id="ses-inner">
  <div id="ses-clock-bar">
    <button class="btn btn-ghost ses-back-btn" onclick="backToSessions()">← Back</button>
    <div id="ses-clock-row1">
      <div id="timer-panel" onclick="handleTimerClick()">
        <div class="ses-clock-label">Game Time</div>
        <div id="session-timer" class="ses-clock-big">--:--</div>
        <div id="timer-hint" class="ses-clock-hint"></div>
      </div>
      <div id="ses-sysclock-panel">
        <div class="ses-clock-label">Now</div>
        <div id="system-clock" class="ses-sysclock-val">00:00:00</div>
        <div class="ses-clock-hint"></div>
      </div>
    </div>
    <div id="ses-clock-row2">
      <div id="ses-chips-panel">
        <div class="ses-clock-label">Chips in Play</div>
        <div id="session-total-chips" class="ses-chips-val">0</div>
      </div>
      <div id="ses-action-btns">
        <button class="btn btn-primary" id="btn-add-player-session" onclick="openAddPlayerToSession()" style="display:none;">+ Add Player</button>
        <button class="btn btn-ghost" id="btn-transfer-chips" onclick="openTransfer()" style="display:none;">⇄ Transfer</button>
        <button class="btn btn-danger" id="btn-close-session" onclick="closeSession()" style="display:none;">End Game</button>
      </div>
    </div>
  </div>

  <div id="ses-body">
    <div id="ses-players-panel">
      <div id="session-players-grid"></div>
    </div>
    <div id="ses-activity-panel">
      <div class="ses-panel-label">Activity</div>
      <div id="ses-activity-feed"></div>
    </div>
  </div>
</div>
</div>
