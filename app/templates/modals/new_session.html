<div class="modal-overlay" id="new-session-modal">
  <div class="modal">
    <h3>New Session</h3>
    <div class="form-group">
      <label>Game Type</label>
      <div style="display:flex; gap:10px; margin-top:4px;">
        <button class="btn btn-ghost" id="type-cash" onclick="selectType('cash')" style="flex:1;">Cash Game</button>
        <button class="btn btn-ghost" id="type-tournament" onclick="selectType('tournament')" style="flex:1;">Tournament</button>
        <button class="btn btn-ghost" id="type-no_chips" onclick="selectType('no_chips')" style="flex:1;">No Chips</button>
      </div>
    </div>
    <div id="buyin-field" class="form-group">
      <label>Default Buy-in</label>
      <input id="new-session-buyin" type="number" min="0" step="100" placeholder="e.g. 1000" />
    </div>
    <div id="blinds-fields" class="form-group" style="display:none;">
      <label>Blinds</label>
      <div class="form-row">
        <div class="form-group">
          <label style="font-size:0.78rem; color:#666;">Small Blind</label>
          <input id="new-session-sb" type="number" min="1" step="1" value="5" />
        </div>
        <div class="form-group">
          <label style="font-size:0.78rem; color:#666;">Big Blind</label>
          <input id="new-session-bb" type="number" min="1" step="1" value="10" />
        </div>
      </div>
    </div>
    <div id="game-name-field" class="form-group" style="display:none;">
      <label>Game Name <span style="color:#555; font-weight:400;">(optional)</span></label>
      <input id="new-session-name" type="text" maxlength="100" placeholder="e.g. Friday Night Game" />
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" onclick="createSession()">Start Session</button>
      <button class="btn btn-ghost" onclick="closeNewSession()">Cancel</button>
    </div>
  </div>
</div>
