<div class="modal-overlay" id="rebuy-modal">
  <div class="modal">
    <h3 id="rebuy-title">Re-buy</h3>
    <div class="form-group">
      <label>Amount</label>
      <div class="stepper">
        <button type="button" class="stepper-btn" onclick="stepAmount('rebuy-amount', -100)">−</button>
        <input id="rebuy-amount" type="number" min="0" step="100" placeholder="1000" />
        <button type="button" class="stepper-btn" onclick="stepAmount('rebuy-amount', 100)">+</button>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" onclick="submitRebuy()">Confirm</button>
      <button class="btn btn-ghost" onclick="closeRebuyModal()">Cancel</button>
    </div>
  </div>
</div>
