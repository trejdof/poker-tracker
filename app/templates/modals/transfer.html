<div class="modal-overlay" id="transfer-modal">
  <div class="modal">
    <h3>Transfer Chips</h3>
    <div style="font-size:0.85rem; color:#888; margin-bottom:16px;">One player gives chips to another. Total chips in play stays the same.</div>
    <div class="form-group">
      <label>From (gives chips)</label>
      <select id="transfer-from" style="width:100%;background:#12141e;border:1px solid #2a2d3a;border-radius:6px;padding:10px 12px;color:#e0e0e0;font-size:0.95rem;outline:none;"></select>
    </div>
    <div class="form-group">
      <label>To (receives chips)</label>
      <select id="transfer-to" style="width:100%;background:#12141e;border:1px solid #2a2d3a;border-radius:6px;padding:10px 12px;color:#e0e0e0;font-size:0.95rem;outline:none;"></select>
    </div>
    <div class="form-group">
      <label>Amount</label>
      <div class="stepper">
        <button type="button" class="stepper-btn" onclick="stepAmount('transfer-amount', -100)">−</button>
        <input id="transfer-amount" type="number" min="0" step="100" placeholder="500" />
        <button type="button" class="stepper-btn" onclick="stepAmount('transfer-amount', 100)">+</button>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" onclick="submitTransfer()">Confirm</button>
      <button class="btn btn-ghost" onclick="closeTransfer()">Cancel</button>
    </div>
  </div>
</div>
