<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Poker Tracker — Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      margin: 16px;
    }
    h1 {
      font-size: 1.5rem;
      color: #c9a84c;
      margin-bottom: 6px;
      text-align: center;
    }
    .sub {
      text-align: center;
      color: #666;
      font-size: 0.88rem;
      margin-bottom: 28px;
    }
    label {
      display: block;
      font-size: 0.85rem;
      color: #aaa;
      margin-bottom: 6px;
    }
    input[type="password"] {
      width: 100%;
      background: #12141e;
      border: 1px solid #2a2d3a;
      border-radius: 8px;
      padding: 12px 14px;
      color: #e0e0e0;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 16px;
    }
    input[type="password"]:focus { border-color: #c9a84c; }
    button {
      width: 100%;
      background: #c9a84c;
      color: #0f1117;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
    .error {
      background: #2a1f1f;
      border: 1px solid #e05c5c;
      color: #e05c5c;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.88rem;
      margin-bottom: 16px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>♠ Poker Tracker</h1>
    <p class="sub">Enter password to continue</p>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="POST">
      <label>Password</label>
      <input type="password" name="password" autofocus placeholder="••••••••" />
      <button type="submit">Enter</button>
    </form>
  </div>
</body>
</html>
